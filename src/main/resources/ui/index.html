<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="__APP_BASE_HREF__">
  <title>XSLT Transformation Service | Eaglessoft</title>
  <meta name="description" content="Transform XML documents with user-provided XSLT 3.0 through a simple web interface.">
  <link rel="icon" type="image/svg+xml" href="FAVICON.svg">
  <link rel="apple-touch-icon" href="Varlik-7.png">
  <link rel="stylesheet" href="app.css?v=3.0">
</head>
<body>
  <div class="top-bar">
    <div class="top-bar-content">
      <a href="https://eaglessoft.com/" target="_blank" rel="noopener noreferrer" class="logo-container">
        <img src="EAGLESSOFT-White@3x.png" alt="Eaglessoft Logo">
      </a>
    </div>
  </div>

  <div class="container workspace-container">
    <header class="page-header">
      <div class="header-content">
        <h1>XSLT Transformation Service</h1>
      </div>
    </header>

    <main class="workspace-layout">
      <div class="workspace-shell">
        <section class="workspace-panel editor-panel">
          <div class="panel-header editor-header">
            <div class="tab-strip" role="tablist" aria-label="Editor mode">
              <button type="button" id="xmlTab" class="tab-button is-active" data-editor="xml" role="tab" aria-selected="true">XML Input</button>
              <button type="button" id="xsltTab" class="tab-button" data-editor="xslt" role="tab" aria-selected="false">XSL Stylesheet</button>
            </div>

            <div class="panel-actions">
              <label id="xmlUploadControl" class="upload-button">
                <span>Upload XML</span>
                <input type="file" id="xmlFile" accept=".xml,text/xml">
              </label>
              <label id="xsltUploadControl" class="upload-button is-hidden">
                <span>Upload XSLT</span>
                <input type="file" id="xsltFile" accept=".xsl,.xslt,text/xml">
              </label>
              <button type="button" id="transformButton" class="btn-primary">Run Transformation</button>
            </div>
          </div>

          <div class="editor-stack">
            <textarea id="xmlInput" class="editor-textarea" spellcheck="false"><root>
  <item>Hello</item>
</root></textarea>
            <textarea id="xsltInput" class="editor-textarea is-hidden" spellcheck="false"><xsl:stylesheet version="3.0" xmlns:xsl="http://www.w3.org/1999/XSL/Transform">
  <xsl:template match="/">
    <result>
      <xsl:value-of select="/root/item"/>
    </result>
  </xsl:template>
</xsl:stylesheet></textarea>
          </div>
        </section>

        <section id="resultPanel" class="workspace-panel result-panel">
          <div class="panel-header result-header">
            <div class="result-title-row">
              <span class="panel-title">Result</span>
              <span id="resultBadge" class="result-badge">Awaiting Request</span>
              <span id="requestStatus" class="status-text" aria-live="polite">Run a transformation to see the latest result.</span>
            </div>

            <button type="button" id="copyResultButton" class="copy-button" disabled aria-label="Copy result">
              <span class="copy-icon" aria-hidden="true"></span>
              <span id="copyTooltip" class="copy-tooltip">Copy</span>
            </button>
          </div>

          <div id="resultOutput" class="result-output"></div>
        </section>
      </div>
    </main>

    <footer>
      <div class="footer-content">
        <p class="footer-brand">Eaglessoft</p>
        <p class="footer-tech">Powered by Saxon-HE (Saxonica) | Source: <a href="https://github.com/Saxonica/Saxon-HE/" target="_blank" rel="noopener noreferrer" class="footer-link">GitHub</a></p>
      </div>
    </footer>
  </div>

  <script defer src="app.js?v=3.0"></script>
</body>
</html>
