version: "3.9"

services:
  xslt-transformation-service:
    image: eaglessoftbv/xslt-transformation-service:latest
    container_name: xslt-transformation-service
    ports:
      - "80:8080"
    environment:
      CONTEXT_PATH: "/"
      LOG_FORMAT: "json"
      LOG_LEVEL: "WARN"
    restart: unless-stopped

