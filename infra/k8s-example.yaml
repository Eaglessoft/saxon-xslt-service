apiVersion: apps/v1
kind: Deployment
metadata:
  name: saxon-xslt-service
  labels:
    app: saxon-xslt-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: saxon-xslt-service
  template:
    metadata:
      labels:
        app: saxon-xslt-service
    spec:
      containers:
        - name: saxon-xslt-service
          image: eaglessoftbv/saxon-xslt-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          env:
            - name: SERVER_SERVLET_CONTEXT_PATH
              value: "/"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: saxon-xslt-service
  labels:
    app: saxon-xslt-service
spec:
  type: ClusterIP
  selector:
    app: saxon-xslt-service
  ports:
    - name: http
      port: 80
      targetPort: http
